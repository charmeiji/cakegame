<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lil Guy Cake Shop MVP</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game-container">
    <header class="customer-bar">
      <button class="customer-icon-btn" id="customerIcon" aria-label="Open customer dialog">
        <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAAC0lEQVR4nGNgAAIAAAUAAXpeqz8AAAAASUVORK5CYII=" alt="Ghost customer" class="customer-icon">
      </button>
      <div class="customer-request">
        <p>Ghost: I would like a cute and tasty cake, please!</p>
      </div>
    </header>

    <main class="main-area">
      <section class="workspace-section">
        <div class="cake-workspace" id="cakeWorkspace">
          <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAAC0lEQVR4nGNgAAIAAAUAAXpeqz8AAAAASUVORK5CYII=" alt="Plate" class="cake-layer cake-plate" id="cakePlate">
          <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAAC0lEQVR4nGNgAAIAAAUAAXpeqz8AAAAASUVORK5CYII=" alt="Cake base" class="cake-layer cake-base" id="cakeBase">
          <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAAC0lEQVR4nGNgAAIAAAUAAXpeqz8AAAAASUVORK5CYII=" alt="Cake frosting" class="cake-layer cake-frosting" id="cakeFrosting">
          <div class="cake-layer cake-decorations" id="cakeDecorations"></div>
        </div>
      </section>

      <section class="ingredients-section">
        <div class="ingredient-group">
          <h2>Base</h2>
          <button class="ingredient-btn" data-base="vanilla">Vanilla</button>
          <button class="ingredient-btn" data-base="chocolate">Chocolate</button>
        </div>
        <div class="ingredient-group">
          <h2>Frosting</h2>
          <button class="ingredient-btn" data-frosting="pink">Pink</button>
          <button class="ingredient-btn" data-frosting="black">Black</button>
        </div>
        <div class="ingredient-group">
          <h2>Decorations</h2>
          <button class="ingredient-btn" id="addSprinklesBtn">Add Sprinkles</button>
        </div>
      </section>

      <section class="controls-section">
        <button class="serve-btn" id="serveBtn">Serve Cake</button>
        <div class="trashcan-wrapper">
          <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAAC0lEQVR4nGNgAAIAAAUAAXpeqz8AAAAASUVORK5CYII=" alt="Trashcan" id="trashcan" class="trashcan-icon">
        </div>
      </section>
    </main>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="customerModal">
      <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAAC0lEQVR4nGNgAAIAAAUAAXpeqz8AAAAASUVORK5CYII=" alt="Ghost customer portrait" class="customer-portrait">
      <div class="modal-text">
        <p>"OooOOOoo! I love cakes with a solid base, tasty frosting, and fun sprinkles!"</p>
      </div>
      <button class="modal-close-btn" id="modalCloseBtn">Got it!</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
